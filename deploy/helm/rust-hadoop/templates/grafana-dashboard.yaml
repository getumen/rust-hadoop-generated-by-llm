{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rust-hadoop.fullname" . }}-grafana-dashboard
  labels:
    {{- include "rust-hadoop.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
    rust-hadoop-dashboard.json: |
      {
        "title": "Rust Hadoop DFS Dashboard",
        "tags": ["rust", "hadoop", "dfs"],
        "timezone": "browser",
        "refresh": "5s",
        "schemaVersion": 38,
        "panels": [
          {
            "title": "Metaserver: Current Role",
            "type": "stat",
            "gridPos": {"h": 8, "w": 6, "x": 0, "y": 0},
            "targets": [{"expr": "raft_role", "legendFormat": "{{`{{`}}instance{{`}}`}}: Role"}],
            "fieldConfig": {
              "defaults": {
                "mappings": [
                  {"type": "value", "options": {"0": {"text": "Follower", "color": "green"}, "1": {"text": "Candidate", "color": "yellow"}, "2": {"text": "Leader", "color": "red"}}}
                ]
              }
            }
          },
          {
            "title": "Metaserver: Safe Mode",
            "type": "stat",
            "gridPos": {"h": 8, "w": 6, "x": 6, "y": 0},
            "targets": [{"expr": "dfs_master_safe_mode_status", "legendFormat": "{{`{{`}}instance{{`}}`}}: SafeMode"}],
            "fieldConfig": {
              "defaults": {
                "mappings": [
                  {"type": "value", "options": {"0": {"text": "OFF", "color": "green"}, "1": {"text": "ON", "color": "red"}}}
                ]
              }
            }
          },
          {
            "title": "S3: Request Rate",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
            "targets": [{"expr": "sum(rate(s3_requests_total[5m])) by (status)", "legendFormat": "Status {{`{{`}}status{{`}}`}}"}]
          },
          {
            "title": "ChunkServer: Storage Usage",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
            "targets": [
              {"expr": "dfs_chunkserver_used_space_bytes", "legendFormat": "{{`{{`}}instance{{`}}`}}: Used"},
              {"expr": "dfs_chunkserver_available_space_bytes", "legendFormat": "{{`{{`}}instance{{`}}`}}: Available"}
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "bytes"
              }
            }
          },
          {
            "title": "ChunkServer: Chunk Count",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
            "targets": [{"expr": "dfs_chunkserver_total_chunks", "legendFormat": "{{`{{`}}instance{{`}}`}}"}]
          },
          {
            "title": "Raft: Log Progress",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
            "targets": [
              {"expr": "raft_commit_index", "legendFormat": "Commit Index"},
              {"expr": "raft_last_applied", "legendFormat": "Last Applied"},
              {"expr": "raft_log_len", "legendFormat": "Log Length"}
            ]
          },
          {
            "title": "── IAM Overview ──",
            "type": "row",
            "gridPos": {"h": 1, "w": 24, "x": 0, "y": 24},
            "collapsed": false
          },
          {
            "title": "IAM: Auth Success Rate",
            "type": "stat",
            "gridPos": {"h": 6, "w": 6, "x": 0, "y": 25},
            "targets": [{"expr": "sum(rate(iam_auth_requests_total{result=\"success\"}[5m])) / sum(rate(iam_auth_requests_total[5m]))"}],
            "fieldConfig": {
              "defaults": {
                "unit": "percentunit",
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    {"color": "red", "value": null},
                    {"color": "yellow", "value": 0.95},
                    {"color": "green", "value": 0.99}
                  ]
                }
              }
            }
          },
          {
            "title": "IAM: Auth Error Breakdown",
            "type": "piechart",
            "gridPos": {"h": 6, "w": 6, "x": 6, "y": 25},
            "targets": [{"expr": "sum by (error_type) (increase(iam_auth_requests_total{result=\"failure\"}[1h]))", "legendFormat": "{{`{{`}}error_type{{`}}`}}"}]
          },
          {
            "title": "IAM: Auth Latency p99",
            "type": "gauge",
            "gridPos": {"h": 6, "w": 6, "x": 12, "y": 25},
            "targets": [{"expr": "histogram_quantile(0.99, sum(rate(iam_auth_duration_seconds_bucket[5m])) by (le))"}],
            "fieldConfig": {
              "defaults": {
                "unit": "s",
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 0.01},
                    {"color": "red", "value": 0.05}
                  ]
                }
              }
            }
          },
          {
            "title": "IAM: Policy Evaluations",
            "type": "stat",
            "gridPos": {"h": 6, "w": 6, "x": 18, "y": 25},
            "targets": [
              {"expr": "sum(rate(iam_policy_evaluations_total{result=\"allow\"}[5m]))", "legendFormat": "Allow/s"},
              {"expr": "sum(rate(iam_policy_evaluations_total{result=\"deny\"}[5m]))", "legendFormat": "Deny/s"}
            ]
          },
          {
            "title": "IAM: Auth Rate Over Time",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 31},
            "targets": [
              {"expr": "sum(rate(iam_auth_requests_total{result=\"success\"}[5m]))", "legendFormat": "Success"},
              {"expr": "sum(rate(iam_auth_requests_total{result=\"failure\"}[5m]))", "legendFormat": "Failure"}
            ]
          },
          {
            "title": "IAM: Policy Evaluation Latency",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 31},
            "targets": [
              {"expr": "histogram_quantile(0.50, sum(rate(iam_policy_evaluation_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p50"},
              {"expr": "histogram_quantile(0.95, sum(rate(iam_policy_evaluation_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95"},
              {"expr": "histogram_quantile(0.99, sum(rate(iam_policy_evaluation_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99"}
            ],
            "fieldConfig": {"defaults": {"unit": "s"}}
          },
          {
            "title": "── STS & OIDC ──",
            "type": "row",
            "gridPos": {"h": 1, "w": 24, "x": 0, "y": 39},
            "collapsed": false
          },
          {
            "title": "STS: Request Rate",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 8, "x": 0, "y": 40},
            "targets": [
              {"expr": "sum(rate(iam_sts_requests_total{result=\"success\"}[5m]))", "legendFormat": "Success"},
              {"expr": "sum(rate(iam_sts_requests_total{result=\"failure\"}[5m]))", "legendFormat": "Failure"}
            ]
          },
          {
            "title": "STS: Error Breakdown",
            "type": "barchart",
            "gridPos": {"h": 8, "w": 8, "x": 8, "y": 40},
            "targets": [{"expr": "sum by (error_type) (increase(iam_sts_requests_total{result=\"failure\"}[1h]))", "legendFormat": "{{`{{`}}error_type{{`}}`}}"}]
          },
          {
            "title": "OIDC: JWKS Freshness",
            "type": "stat",
            "gridPos": {"h": 8, "w": 8, "x": 16, "y": 40},
            "targets": [{"expr": "time() - iam_oidc_jwks_last_fetch_timestamp", "legendFormat": "Age"}],
            "fieldConfig": {
              "defaults": {
                "unit": "s",
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 3600},
                    {"color": "red", "value": 21600}
                  ]
                }
              }
            }
          }
        ]
      }
{{- end }}
