apiVersion: v1
kind: Service
metadata:
  name: {{ include "rust-hadoop.fullname" . }}-s3server
  labels:
    {{- include "rust-hadoop.labels" . | nindent 4 }}
    component: s3server
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.s3server.port }}
      targetPort: {{ .Values.s3server.port }}
      protocol: TCP
      name: s3-metrics
  selector:
    {{- include "rust-hadoop.selectorLabels" . | nindent 4 }}
    component: s3server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rust-hadoop.fullname" . }}-s3server
  labels:
    {{- include "rust-hadoop.labels" . | nindent 4 }}
    component: s3server
spec:
  replicas: {{ .Values.s3server.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "rust-hadoop.selectorLabels" . | nindent 6 }}
      component: s3server
  template:
    metadata:
      labels:
        {{- include "rust-hadoop.selectorLabels" . | nindent 8 }}
        component: s3server
    spec:
      containers:
        - name: s3server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/s3-server
          env:
            - name: MASTER_ADDR
              value: "http://{{ include "rust-hadoop.fullname" . }}-metaserver-headless:{{ .Values.metaserver.port }}"
            - name: CONFIG_SERVERS
              value: "http://{{ include "rust-hadoop.fullname" . }}-configserver-headless:{{ .Values.configserver.port }}"
            - name: PORT
              value: {{ .Values.s3server.port | quote }}
            - name: S3_AUTH_ENABLED
              value: {{ .Values.s3server.auth.enabled | quote }}
            - name: S3_REQUIRE_TLS
              value: {{ .Values.s3server.auth.requireTls | quote }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.s3server.auth.oidc.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.s3server.auth.oidc.clientId | quote }}
            - name: STS_SIGNING_KEY
              value: {{ .Values.s3server.auth.sts.signingKey | quote }}
            - name: IAM_CONFIG_PATH
              value: "/etc/s3server/iam_config.json"
          ports:
            - containerPort: {{ .Values.s3server.port }}
              name: s3-metrics
          volumeMounts:
            - name: iam-config
              mountPath: /etc/s3server/iam_config.json
              subPath: iam_config.json
          livenessProbe:
            tcpSocket:
              port: {{ .Values.s3server.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: {{ .Values.s3server.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.s3server.resources | nindent 12 }}
      volumes:
        - name: iam-config
          configMap:
            name: {{ include "rust-hadoop.fullname" . }}-config
            items:
              - key: iam_config.json
                path: iam_config.json
