
services:
  config-server:
    build:
      context: .
      secrets:
        - ca_cert
    container_name: dfs-config-server
    command: /app/config_server --addr 0.0.0.0:50050 --id 1 --peers "" --http-port 8080 --storage-dir /data/config-raft --advertise-addr http://config-server:50050
    environment:
      - RUST_LOG=info,dfs_metaserver::simple_raft=warn
    ports:
      - "8080:8080"
    networks:
      - dfs-sharded-network
    volumes:
      - config-server-data:/data/config-raft

  # ==========================================
  # Shard 1
  # ==========================================
  master1-shard1:
    build:
      context: .
      secrets:
        - ca_cert
    container_name: dfs-master1-shard1
    command: /app/master --addr 0.0.0.0:50051 --id 1 --peers "" --http-port 8080 --storage-dir /data/raft --advertise-addr http://dfs-master1-shard1:50051 --shard-id shard-1 --config-servers http://config-server:50050 --merge-threshold-rps=-1.0
    environment:
      - RUST_LOG=info,dfs_metaserver::simple_raft=warn
      - COLD_THRESHOLD_SECS=604800
      - EC_THRESHOLD_SECS=2592000
    ports:
      - "8081:8080"
    networks:
      - dfs-sharded-network
    depends_on:
      - config-server
    volumes:
      - master1-shard1-data:/data/raft
    healthcheck:
      test: [ "CMD", "sh", "-c", "netstat -an | grep 50051 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 3

  chunkserver1-shard1:
    build:
      context: .
      secrets:
        - ca_cert
    container_name: dfs-chunkserver1-shard1
    command: /app/chunkserver --addr 0.0.0.0:50052 --config-servers http://config-server:50050 --storage-dir /data/cs1 --cold-storage-dir /data/cold --advertise-addr dfs-chunkserver1-shard1:50052
    networks:
      - dfs-sharded-network
    depends_on:
      - master1-shard1
      - config-server
    environment:
      - SHARD_CONFIG=/app/shard_config.json
    volumes:
      - cs1-shard1-data:/data/cs1
      - cs1-shard1-cold:/data/cold
      - ./shard_config.json:/app/shard_config.json:ro

  # ==========================================
  # Shard 2
  # ==========================================
  master1-shard2:
    build:
      context: .
      secrets:
        - ca_cert
    container_name: dfs-master1-shard2
    command: /app/master --addr 0.0.0.0:50051 --id 1 --peers "" --http-port 8080 --storage-dir /data/raft --advertise-addr http://dfs-master1-shard2:50051 --shard-id shard-2 --config-servers http://config-server:50050 --merge-threshold-rps=-1.0
    environment:
      - RUST_LOG=info,dfs_metaserver::simple_raft=warn
      - COLD_THRESHOLD_SECS=604800
      - EC_THRESHOLD_SECS=2592000
    ports:
      - "8091:8080"
    networks:
      - dfs-sharded-network
    depends_on:
      - config-server
    volumes:
      - master1-shard2-data:/data/raft
    healthcheck:
      test: [ "CMD", "sh", "-c", "netstat -an | grep 50051 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 3

  chunkserver1-shard2:
    build:
      context: .
      secrets:
        - ca_cert
    container_name: dfs-chunkserver1-shard2
    command: /app/chunkserver --addr 0.0.0.0:50052 --config-servers http://config-server:50050 --storage-dir /data/cs1 --cold-storage-dir /data/cold --advertise-addr dfs-chunkserver1-shard2:50052
    networks:
      - dfs-sharded-network
    depends_on:
      - master1-shard2
      - config-server
    environment:
      - SHARD_CONFIG=/app/shard_config.json
    volumes:
      - cs1-shard2-data:/data/cs1
      - cs1-shard2-cold:/data/cold
      - ./shard_config.json:/app/shard_config.json:ro

  chunkserver-extra:
    build:
      context: .
      secrets:
        - ca_cert
    container_name: dfs-chunkserver-extra
    command: /app/chunkserver --addr 0.0.0.0:50052 --config-servers http://config-server:50050 --storage-dir /data/cs-extra --cold-storage-dir /data/cold --advertise-addr dfs-chunkserver-extra:50052
    networks:
      - dfs-sharded-network
    depends_on:
      - config-server
    environment:
      - SHARD_CONFIG=/app/shard_config.json
    volumes:
      - cs-extra-data:/data/cs-extra
      - cs-extra-cold:/data/cold
      - ./shard_config.json:/app/shard_config.json:ro

  chunkserver-extra2:
    build:
      context: .
      secrets:
        - ca_cert
    container_name: dfs-chunkserver-extra2
    command: /app/chunkserver --addr 0.0.0.0:50052 --config-servers http://config-server:50050 --storage-dir /data/cs-extra2 --cold-storage-dir /data/cold --advertise-addr dfs-chunkserver-extra2:50052
    networks:
      - dfs-sharded-network
    depends_on:
      - config-server
    environment:
      - SHARD_CONFIG=/app/shard_config.json
    volumes:
      - cs-extra2-data:/data/cs-extra2
      - cs-extra2-cold:/data/cold
      - ./shard_config.json:/app/shard_config.json:ro

  s3-server:
    build:
      context: .
      secrets:
        - ca_cert
    container_name: dfs-s3-server
    command: /app/s3-server
    environment:
      - MASTER_ADDR=http://dfs-master1-shard1:50051
      - CONFIG_SERVERS=http://config-server:50050
      - SHARD_CONFIG=/app/shard_config.json
      - AUDIT_HMAC_SECRET=chaos_test_audit_secret_key_16bytes
      - SSE_MASTER_KEY=0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20
    volumes:
      - ./shard_config.json:/app/shard_config.json:ro
    ports:
      - "9000:9000"
    networks:
      - dfs-sharded-network
    depends_on:
      - master1-shard1
      - config-server

networks:
  dfs-sharded-network:
    driver: bridge

volumes:
  config-server-data:
  master1-shard1-data:
  cs1-shard1-data:
  cs1-shard1-cold:
  master1-shard2-data:
  cs1-shard2-data:
  cs1-shard2-cold:
  cs-extra-data:
  cs-extra-cold:
  cs-extra2-data:
  cs-extra2-cold:

secrets:
  ca_cert:
    file: ./ca.pem
